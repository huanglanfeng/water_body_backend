server:
  port: 8080
publish:
  mqtt:
    host: tcp://8.130.18.84:1883
    username: admin
    password: public
    cleansession: false
    clientid: idea_mqtt_publish
    default_topic: 测试
    timeout: 1000
    keepalive: 10
    connectionTimeout: 3000

  servlet:
    context-path: /
    encoding:
      enabled: true
      force: true
      charset: UTF-8

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/waterbody?characterEncoding=UTF-8&useUnicode=true&useSSL=false&tinyInt1isBit=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&connectTimeout=5000&socketTimeout=10000}
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:1234}
    druid:
      initial-size: 1
      min-idle: 1
      max-active: 5
      max-wait: 10000
      connect-timeout: 5000
      socket-timeout: 10000
      query-timeout: 10
      connection-properties: connectTimeout=5000;socketTimeout=10000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      keep-alive: true
      time-between-eviction-runs-millis: 60000

  redis:
    host: ${REDISHOST:localhost}
    port: ${REDISPORT:6379}
    password: ${REDIS_PASSWORD:}
    client-type: lettuce
    lettuce:
      pool:
        max-active: 16

  mail:
    host: smtp.qq.com
    username: heichoushuiti@qq.com
    password: bazrkxuljjirhaeg
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
      protocol: smtps
      port: 465

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

mybatis-plus:
  mapperLocations: classpath:mapper/*.xml
  configuration:
    mapUnderscoreToCamelCase: true
    jdbc-type-for-null: null
  global-config:
    banner: false
    db-config:
      id-type: auto
      table-underline: true

aliyun:
  oss:
    file:
      endpoint: ${OSS_ENDPOINT:https://oss-cn-beijing.aliyuncs.com}
      keyid: ${OSS_ACCESS_KEY_ID:}
      keysecret: ${OSS_ACCESS_KEY_SECRET:}
      bucketname: ${OSS_BUCKET_NAME:waterbody}
