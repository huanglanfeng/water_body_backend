server:
  port: ${PORT:8080}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/waterbody?characterEncoding=UTF-8&useUnicode=true&useSSL=false&tinyInt1isBit=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&connectTimeout=5000&socketTimeout=10000}
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:1234}
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000
      max-lifetime: 600000
      connection-test-query: SELECT 1

  sql:
    init:
      mode: always
      encoding: UTF-8
      continue-on-error: true

  redis:
    host: ${REDISHOST:localhost}
    port: ${REDISPORT:6379}
    password: ${REDIS_PASSWORD:}
    client-type: lettuce
    lettuce:
      pool:
        max-active: 16

  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
      protocol: smtps
      port: 465

  servlet:
    encoding:
      enabled: true
      force: true
      charset: UTF-8

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

mybatis-plus:
  mapperLocations: classpath:mapper/*.xml
  configuration:
    mapUnderscoreToCamelCase: true
    jdbc-type-for-null: null
  global-config:
    banner: false
    db-config:
      id-type: auto
      table-underline: true

# MQTT 配置
publish:
  mqtt:
    host: ${MQTT_HOST:tcp://localhost:1883}
    username: ${MQTT_USERNAME:admin}
    password: ${MQTT_PASSWORD:}
    cleansession: false
    clientid: idea_mqtt_publish
    default_topic: 测试
    timeout: 1000
    keepalive: 10
    connectionTimeout: 3000

# 阿里云 OSS
aliyun:
  oss:
    file:
      endpoint: ${OSS_ENDPOINT:https://oss-cn-beijing.aliyuncs.com}
      keyid: ${OSS_ACCESS_KEY_ID:}
      keysecret: ${OSS_ACCESS_KEY_SECRET:}
      bucketname: ${OSS_BUCKET_NAME:waterbody}
